<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAA Student Journey Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F2EE;--surface:#FFF;--surface2:#EDEBE6;
  --border:rgba(0,0,0,0.08);--border-md:rgba(0,0,0,0.14);
  --text:#1C1B18;--text2:#6B6960;--text3:#A8A59C;
  --purple:#34469C;--purple-bg:#E8EAF6;--purple-dk:#222F6B;
  --teal:#0D8A85;--teal-bg:#DFF5F3;--teal-dk:#0A6864;
  --amber:#8A5200;--amber-bg:#FEF3DC;--amber-dk:#5C3500;
  --red:#B02828;--red-bg:#FCEAEA;--red-dk:#7A1A1A;
  --green:#2E6B12;--green-bg:#EAF5E1;--green-dk:#1E4A0C;
  --blue:#1A5FA8;--blue-bg:#E5F0FB;--blue-dk:#0D3E73;
  --gray-bg:#EEECEA;--gray-dk:#4A4840;
  --wa-teal:#55C3C0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.6;min-height:100vh;}
.topbar{background:var(--surface);border-bottom:0.5px solid var(--border-md);display:flex;align-items:center;padding:0 20px;gap:14px;position:sticky;top:0;z-index:50;height:52px;}
.logo{font-size:14px;font-weight:600;display:flex;align-items:center;gap:8px;}
.logo-icon{width:30px;height:30px;background:var(--purple);border-radius:8px;display:flex;align-items:center;justify-content:center;padding:4px;}
.logo-icon svg{width:13px;height:13px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;}
.logo-sub{font-size:11px;color:var(--text3);}
.tab-nav{display:flex;gap:2px;margin-left:20px;}
.tab-btn{padding:5px 14px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid transparent;border-radius:8px;background:transparent;color:var(--text2);font-family:inherit;transition:all .12s;}
.tab-btn:hover{background:var(--surface2);}
.tab-btn.active{background:var(--purple-bg);border-color:var(--purple);color:var(--purple-dk);font-weight:600;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.last-upd{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.icon-btn{font-size:11px;color:var(--text2);background:var(--surface2);border:0.5px solid var(--border-md);border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:4px;}
.icon-btn:hover{background:var(--border);}
.app-body{display:grid;grid-template-columns:240px 1fr;height:calc(100vh - 52px);overflow:hidden;}
.sidebar{background:var(--surface);border-right:0.5px solid var(--border-md);padding:14px;display:flex;flex-direction:column;gap:10px;overflow-y:auto;}
.main{overflow-y:auto;padding:18px 22px;}
.f-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.f-input{width:100%;padding:7px 9px;border:0.5px solid var(--border-md);border-radius:9px;background:var(--surface2);color:var(--text);font-size:12px;font-family:inherit;}
.f-input:focus{outline:2px solid var(--purple);outline-offset:-1px;}
.f-chips{display:flex;flex-direction:column;gap:3px;}
.chip{padding:5px 9px;border-radius:7px;font-size:11px;cursor:pointer;background:var(--surface2);border:0.5px solid transparent;color:var(--text2);display:flex;justify-content:space-between;align-items:center;transition:all .1s;}
.chip:hover{border-color:var(--border-md);}
.chip.active{background:var(--purple-bg);border-color:var(--purple);color:var(--purple-dk);font-weight:500;}
.divider{height:0.5px;background:var(--border);margin:3px 0;}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.stat-card{background:var(--surface2);border-radius:9px;padding:9px;}
.stat-v{font-size:18px;font-weight:600;line-height:1;margin-bottom:1px;}
.stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;}
.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:14px;}
.kpi{background:var(--surface);border:0.5px solid var(--border-md);border-radius:12px;padding:12px 14px;}
.kpi-l{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);margin-bottom:5px;}
.kpi-v{font-size:26px;font-weight:600;line-height:1;letter-spacing:-.5px;}
.kpi-s{font-size:10px;color:var(--text2);margin-top:3px;}
.kpi-bar{height:3px;background:var(--border);border-radius:2px;margin-top:6px;overflow:hidden;}
.kpi-fill{height:100%;border-radius:2px;background:var(--purple);transition:width .5s;}
.charts-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;}
.chart-card{background:var(--surface);border:0.5px solid var(--border-md);border-radius:12px;padding:14px;}
.chart-title{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em;}
.bar-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.bar-lbl{font-size:10px;color:var(--text2);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-bg{flex:1;height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;transition:width .5s;}
.bar-val{font-size:10px;font-family:'DM Mono',monospace;color:var(--text2);min-width:28px;text-align:right;}
.tcard{background:var(--surface);border:0.5px solid var(--border-md);border-radius:12px;overflow:hidden;}
.thead-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:0.5px solid var(--border);}
.ttitle{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;}
.tcnt{font-size:10px;color:var(--text3);font-family:'DM Mono',monospace;}
.twrap{overflow-x:auto;max-height:calc(100vh - 400px);overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;}
th{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);text-align:left;padding:7px 11px;border-bottom:0.5px solid var(--border-md);position:sticky;top:0;background:var(--surface);white-space:nowrap;cursor:pointer;user-select:none;}
th:hover{color:var(--text);}
td{padding:8px 11px;border-bottom:0.5px solid var(--border);vertical-align:middle;white-space:nowrap;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--surface2);cursor:pointer;}
.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:9px;font-weight:600;}
.t1{background:var(--green-bg);color:var(--green-dk);}
.t2{background:var(--blue-bg);color:var(--blue-dk);}
.t3{background:var(--amber-bg);color:var(--amber-dk);}
.t4,.t5{background:var(--red-bg);color:var(--red-dk);}
.nps-p{background:var(--green-bg);color:var(--green-dk);}
.nps-a{background:var(--amber-bg);color:var(--amber-dk);}
.nps-d{background:var(--red-bg);color:var(--red-dk);}
.jo-y{background:var(--teal-bg);color:var(--teal-dk);}
.jo-n{background:var(--gray-bg);color:var(--gray-dk);}
.pct-bar{display:flex;align-items:center;gap:5px;}
.pbar-bg{width:44px;height:3px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:2px;background:var(--purple);}
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.3);z-index:100;display:flex;align-items:flex-start;justify-content:flex-end;}
.detail-panel{width:440px;height:100vh;background:var(--surface);overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;border-left:0.5px solid var(--border-md);}
.dp-close{width:26px;height:26px;background:var(--surface2);border:none;border-radius:7px;cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;}
.dp-name{font-size:16px;font-weight:600;}
.dp-meta{font-size:11px;color:var(--text2);margin-top:2px;}
.dp-kpi{display:grid;grid-template-columns:1fr 1fr;gap:7px;}
.dp-kc{background:var(--surface2);border-radius:9px;padding:9px 11px;}
.dp-kl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px;}
.dp-kv{font-size:18px;font-weight:600;line-height:1.2;}
.dp-sec{font-size:9px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--text3);margin-bottom:7px;}
.sc-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.sc-key{font-size:10px;color:var(--text2);width:80px;}
.sc-bg{flex:1;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;}
.sc-fill{height:100%;border-radius:2px;background:var(--purple);}
.sc-num{font-size:10px;font-weight:600;min-width:28px;text-align:right;font-family:'DM Mono',monospace;}
.logbook-item{background:var(--surface2);border-radius:8px;padding:8px 10px;font-size:11px;margin-bottom:5px;}
.empty{text-align:center;padding:50px 20px;color:var(--text3);}
.loading-bar{width:100%;height:2px;background:var(--border);border-radius:1px;overflow:hidden;margin-bottom:20px;}
.loading-bar-fill{height:100%;background:var(--purple);border-radius:1px;animation:ld 1.5s ease-in-out infinite;}
@keyframes ld{0%{width:0%;margin-left:0}50%{width:70%;margin-left:15%}100%{width:0%;margin-left:100%}}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border-md);border-radius:2px;}
</style>
</head>

<script>
const URLS = {
  regional: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRi-jQsaof8eDBAktqMwPHBTnLWa6k6dclPGxJqXadwEcIQCa-kdtSPzYS_AWM3JFgT1zVDLwEFemsg/pub?gid=1100531705&single=true&output=csv',
  batch:    'https://docs.google.com/spreadsheets/d/e/2PACX-1vTIrmvLW6-YDuCiZ4yjc3_JAKhjdmSJDGKho1h87sceCPmTpsK-_i9guzRp74SVjoRL5mE_htpHVEpn/pub?gid=60027353&single=true&output=csv',
  student:  'https://docs.google.com/spreadsheets/d/e/2PACX-1vQM5Tf6IhPba3Bcr4rlDWFkZ_CixyF7i41bpDupnP5P3tLdkgiNr8ntBN8aXGhy_BXnWsQOO3FjxRp-/pub?gid=197355243&single=true&output=csv'
};
const PROXIES = [u=>u, u=>'https://corsproxy.io/?'+encodeURIComponent(u), u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u)];

let DATA={regional:[],batch:[],student:[]};
let activeTab='regional';
let filters={
  regional:{program:'',regional:'',tier:'',search:''},
  batch:{program:'',regional:'',tier:'',search:''},
  student:{program:'',batch:'',tier:'',jo:'',event:'',search:''}
};

window.onload=reloadAll;

async function reloadAll(){
  setMain('<div class="loading-bar"><div class="loading-bar-fill"></div></div><div class="empty">Memuat data...</div>');
  await Promise.all(['regional','batch','student'].map(k=>loadSheet(k)));
  document.getElementById('lastUpd').textContent='Update '+new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
  renderTab();
}

async function loadSheet(key){
  const url=URLS[key];
  for(const proxy of PROXIES){
    try{
      const r=await fetch(proxy(url));
      if(!r.ok) continue;
      const t=await r.text();
      const lines=t.trim().split('\n').length;
      if(t && lines>1){
        DATA[key]=parseCSV(t);
        // Fix batch: compute tier dari avg_tier_score kalau kolom tier tidak ada
        if(key==='batch'){
          DATA[key]=DATA[key].map(r=>{
            if(!r.tier && r.avg_tier_score){
              const s=parseFloat(r.avg_tier_score);
              r.tier = s>=85?'1 - Excellent':s>=75?'2 - Good':s>=65?'3 - Need Improvement':s>=50?'4 - At-Risk':'5 - Critical';
            }
            return r;
          });
        }
        console.log(`[${key}] ${DATA[key].length} rows OK`);
        return;
      }
    }catch(e){console.warn(`[${key}] proxy failed:`,e.message);}
  }
  console.error(`[${key}] FAILED - all proxies`);
}

function parseCSV(text){
  // Parser proper: scan karakter demi karakter, bukan split per baris dulu.
  // Ini penting karena field seperti kualitatif_feedback/list_sesi bisa
  // mengandung newline atau koma literal di dalam tanda kutip.
  const rows=[];
  let row=[],cur='',inQ=false;
  let i=0;
  const len=text.length;
  while(i<len){
    const ch=text[i];
    if(inQ){
      if(ch==='"'){
        if(text[i+1]==='"'){cur+='"';i+=2;continue;} // escaped quote ""
        inQ=false;i++;continue;
      }
      cur+=ch;i++;continue;
    } else {
      if(ch==='"'){inQ=true;i++;continue;}
      if(ch===','){row.push(cur);cur='';i++;continue;}
      if(ch==='\r'){i++;continue;}
      if(ch==='\n'){row.push(cur);rows.push(row);row=[];cur='';i++;continue;}
      cur+=ch;i++;continue;
    }
  }
  if(cur!==''||row.length){row.push(cur);rows.push(row);}
  if(rows.length<2) return [];

  const headers=rows[0].map(h=>h.trim().toLowerCase().replace(/\s+/g,'_'));
  return rows.slice(1).filter(r=>r.length>1||r[0]!=='').map(vals=>{
    const obj={};
    headers.forEach((h,idx)=>{
      let v=(vals[idx]!==undefined?vals[idx]:'').trim();
      if(v===''||v==='NaN'||v==='null'||v==='None') v=null;
      obj[h]=v;
    });
    return obj;
  }).filter(r=>Object.values(r).some(v=>v));
}

function switchTab(tab){
  activeTab=tab;
  document.querySelectorAll('.tab-btn').forEach((b,i)=>{
    b.classList.toggle('active',['regional','batch','student'][i]===tab);
  });
  renderTab();
}
function renderTab(){
  if(activeTab==='regional') renderRegional();
  else if(activeTab==='batch') renderBatch();
  else renderStudent();
}

function n(v,def=0){const x=parseFloat(v);return isNaN(x)?def:x;}
// Partial, case-insensitive match — supports exact selection from datalist or partial typing
function matchFilter(value,filterText){
  if(!filterText) return true;
  if(!value) return false;
  return value.toLowerCase().includes(filterText.toLowerCase());
}
function sc(v){return n(v)>0?n(v).toFixed(1):'—';}
function avg(arr,key){const vs=arr.map(r=>n(r[key])).filter(v=>v>0);return vs.length?vs.reduce((a,b)=>a+b,0)/vs.length:0;}
function displayName(r){return r.student_name||r.searching_id||'—';}
// Issues breakdown: NPS detractor + rating rendah + complaint (jangan digabung jadi 1 angka tanpa konteks)
function issuesCount(r){
  return n(r.jumlah_nps_detractor)+n(r.jumlah_rating_rendah)+n(r.jumlah_complaint);
}
// Daftar program during-program yang valid untuk dashboard ini (safety net kalau data BQ belum terfilter)
const VALID_PROGRAMS=['Ausbildung (Jerman)','Tokutei Ginou (Jepang)','WA to Multiple Country - White Collar','WA to Multiple Country - Blue Collar'];
function isValidProgram(p){
  if(!p) return false;
  return /ausbildung|tokutei|white collar|blue collar/i.test(p);
}
// Kata kunci yang menandakan batch ini POST-program (job matching, pemantapan, dll)
// meski mengandung "Tokutei" atau "Ausbildung" di namanya
const POST_PROGRAM_KEYWORDS=/job matching|screening|mendan|kaiwa|pemantapan|ssw|pengolahan makanan|restoran|intervention/i;
function isDuringProgramBatch(batchName){
  if(!batchName) return false;
  if(POST_PROGRAM_KEYWORDS.test(batchName)) return false;
  return /ausbildung|tokutei/i.test(batchName);
}

function tierBadge(t){
  if(!t) return '<span class="badge" style="background:var(--gray-bg);color:var(--gray-dk)">—</span>';
  const raw=t.replace(/^\d\s*-\s*/,'');
  const cls=raw.includes('Excellent')?'t1':raw.includes('Good')?'t2':raw.includes('Need')?'t3':raw.includes('Risk')?'t4':'t5';
  return `<span class="badge ${cls}">${raw}</span>`;
}
function npsBadge(s){
  if(!s) return '—';
  return `<span class="badge ${s==='Promoter'?'nps-p':s==='Passive'?'nps-a':'nps-d'}">${s}</span>`;
}
function joBadge(f){
  return f==='Dapat JO'?'<span class="badge jo-y">Dapat JO</span>':'<span class="badge jo-n">Belum JO</span>';
}
function pctBar(v){
  const val=Math.min(n(v),100);
  return `<div class="pct-bar"><div class="pbar-bg"><div class="pbar-fill" style="width:${val}%"></div></div><span style="font-family:'DM Mono',monospace;font-size:10px">${val>0?val.toFixed(1)+'%':'—'}</span></div>`;
}
function barChart(items,color='var(--purple)'){
  const colors=Array.isArray(color)?color:null;
  const max=Math.max(...items.map(i=>i.v),1);
  return items.map((i,idx)=>`<div class="bar-row">
    <span class="bar-lbl" title="${i.l}">${i.l}</span>
    <div class="bar-bg"><div class="bar-fill" style="width:${(i.v/max*100).toFixed(1)}%;background:${colors?colors[idx]||colors[0]:color}"></div></div>
    <span class="bar-val">${n(i.v)>0?n(i.v).toFixed(Number.isInteger(i.v)?0:1):0}</span>
  </div>`).join('');
}
function setMain(html){document.getElementById('mainContent').innerHTML=html;}
function setSidebar(html){document.getElementById('sidebar').innerHTML=html;}

function buildFilters(opts,fkey){
  const f=filters[fkey];
  let html='';
  if(opts.search!==false) html+=`<div><div class="f-label">Cari</div><input class="f-input" value="${f.search||''}" placeholder="Ketik untuk cari..." oninput="filters['${fkey}'].search=this.value;renderTab()"></div>`;
  if(opts.program){
    const progs=[...new Set(DATA[fkey].map(r=>r.program).filter(p=>p&&isValidProgram(p)))].sort((a,b)=>a.localeCompare(b));
    html+=searchableSelect('Program',fkey,'program',progs,f.program,'Semua program');
  }
  if(opts.regional){
    const regs=[...new Set(DATA[fkey].map(r=>r.regional).filter(Boolean))].sort((a,b)=>a.localeCompare(b));
    html+=searchableSelect('Regional',fkey,'regional',regs,f.regional,'Semua regional');
  }
  if(opts.batch){
    const batches=[...new Set(DATA[fkey].map(r=>r.batch).filter(b=>b&&isDuringProgramBatch(b)))].sort((a,b)=>a.localeCompare(b));
    html+=searchableSelect('Batch',fkey,'batch',batches,f.batch,'Semua batch');
  }
  if(opts.event){
    const events=new Set();
    DATA.student.forEach(r=>{
      if(r.list_sesi&&isDuringProgramBatch(r.batch))(r.list_sesi||'').split('|').forEach(s=>{const t=s.trim();if(t)events.add(t);});
    });
    const evList=[...events].sort((a,b)=>a.localeCompare(b));
    html+=searchableSelect('Event / Logbook',fkey,'event',evList,f.event,'Semua event');
  }
  if(opts.tier){
    const tiers=['1 - Excellent','2 - Good','3 - Need Improvement','4 - At-Risk','5 - Critical'];
    html+=`<div class="divider"></div><div><div class="f-label">Tier</div><div class="f-chips">
      <div class="chip${!f.tier?' active':''}" onclick="filters['${fkey}'].tier='';renderTab()">Semua</div>
      ${tiers.map(t=>`<div class="chip${f.tier===t?' active':''}" onclick="filters['${fkey}'].tier='${t}';renderTab()">${t.replace(/^\d - /,'')}</div>`).join('')}
    </div></div>`;
  }
  if(opts.jo){
    html+=`<div class="divider"></div><div><div class="f-label">Status JO</div><div class="f-chips">
      <div class="chip${!f.jo?' active':''}" onclick="filters['${fkey}'].jo='';renderTab()">Semua</div>
      <div class="chip${f.jo==='Dapat JO'?' active':''}" onclick="filters['${fkey}'].jo='Dapat JO';renderTab()">Dapat JO</div>
      <div class="chip${f.jo==='Belum JO'?' active':''}" onclick="filters['${fkey}'].jo='Belum JO';renderTab()">Belum JO</div>
    </div></div>`;
  }
  return html;
}

// Searchable combobox: input + datalist, native browser autocomplete dengan search-as-you-type
function searchableSelect(label,fkey,field,options,current,placeholder){
  const listId=`dl-${fkey}-${field}`;
  const datalistOpts=options.map(o=>`<option value="${o.replace(/"/g,'&quot;')}">`).join('');
  return `<div>
    <div class="f-label">${label}</div>
    <input class="f-input" list="${listId}" value="${current||''}" placeholder="${placeholder}"
      oninput="applySearchableFilter('${fkey}','${field}',this.value)"
      onchange="applySearchableFilter('${fkey}','${field}',this.value)">
    <datalist id="${listId}">${datalistOpts}</datalist>
  </div>`;
}
function applySearchableFilter(fkey,field,value){
  filters[fkey][field]=value||'';
  renderTab();
}

// ── REGIONAL ──────────────────────────────────────────────────────────────────
function renderRegional(){
  const f=filters.regional;
  const data=DATA.regional.filter(r=>{
    if(f.search&&!(r.regional||'').toLowerCase().includes(f.search.toLowerCase())) return false;
    if(f.program&&!matchFilter(r.program,f.program)) return false;
    if(f.regional&&!matchFilter(r.regional,f.regional)) return false;
    if(f.tier&&(r.tier_regional||r.tier)!==f.tier) return false;
    return true;
  });
  setSidebar(buildFilters({search:true,program:true,regional:true,tier:true},'regional'));
  if(!data.length){setMain('<div class="empty">Tidak ada data regional.</div>');return;}

  const totSt=data.reduce((s,r)=>s+n(r.total_student),0);
  const totBt=data.reduce((s,r)=>s+n(r.total_batch),0);
  const avgH=avg(data,'avg_kehadiran');
  const avgN=avg(data,'avg_nilai_akumulasi');
  const avgNAusR=avg(data.filter(r=>/ausbildung/i.test(r.program||'')),'avg_nilai_ausbildung');
  const avgNTokR=avg(data.filter(r=>/tokutei/i.test(r.program||'')),'avg_nilai_tokutei');
  const totJO=data.reduce((s,r)=>s+n(r.total_dapat_jo),0);

  const kpi=`<div class="kpi-row">
    <div class="kpi"><div class="kpi-l">Total Student</div><div class="kpi-v">${totSt.toLocaleString('id')}</div><div class="kpi-s">${data.length} regional aktif</div></div>
    <div class="kpi"><div class="kpi-l">Total Batch</div><div class="kpi-v">${totBt.toLocaleString('id')}</div><div class="kpi-s">Batch berjalan</div></div>
    <div class="kpi"><div class="kpi-l">Avg Kehadiran</div><div class="kpi-v">${avgH.toFixed(1)}%</div><div class="kpi-s">Semua regional</div><div class="kpi-bar"><div class="kpi-fill" style="width:${avgH}%"></div></div></div>
    <div class="kpi"><div class="kpi-l">Avg Nilai</div><div class="kpi-v">${avgN.toFixed(1)}</div><div style="display:flex;gap:10px;margin-top:4px">
      <div style="font-size:10px;color:var(--text3)">Aus: <b style="color:var(--text2)">${avgNAusR>0?avgNAusR.toFixed(1):'—'}</b></div>
      <div style="font-size:10px;color:var(--text3)">Tok: <b style="color:var(--text2)">${avgNTokR>0?avgNTokR.toFixed(1):'—'}</b></div>
    </div></div>
    <div class="kpi"><div class="kpi-l">Dapat JO</div><div class="kpi-v">${totJO.toLocaleString('id')}</div><div class="kpi-s">${totSt>0?(totJO/totSt*100).toFixed(1)+'%':''} dari total</div></div>
  </div>`;

  const charts=`<div class="charts-row">
    <div class="chart-card"><div class="chart-title">Avg Kehadiran per Regional</div>${barChart([...data].sort((a,b)=>n(b.avg_kehadiran)-n(a.avg_kehadiran)).slice(0,6).map(r=>({l:r.regional||'?',v:n(r.avg_kehadiran)})))}</div>
    <div class="chart-card"><div class="chart-title">Avg Nilai per Regional</div>${barChart([...data].sort((a,b)=>n(b.avg_nilai_akumulasi)-n(a.avg_nilai_akumulasi)).slice(0,6).map(r=>({l:r.regional||'?',v:n(r.avg_nilai_akumulasi)})),'var(--teal)')}</div>
    <div class="chart-card"><div class="chart-title">Distribusi Tier</div>${barChart(['1 - Excellent','2 - Good','3 - Need Improvement','4 - At-Risk','5 - Critical'].map(t=>({l:t.replace(/^\d - /,''),v:data.filter(r=>(r.tier_regional||r.tier)===t).length})),'var(--blue)')}</div>
  </div>`;

  const rows=data.map(r=>`<tr>
    <td><b>${r.regional||'—'}</b></td><td>${r.program||'—'}</td><td>${r.skema_kelas||'—'}</td>
    <td style="text-align:right">${n(r.total_batch)}</td><td style="text-align:right">${n(r.total_student).toLocaleString('id')}</td>
    <td>${pctBar(r.avg_kehadiran)}</td><td style="font-family:'DM Mono',monospace">${sc(r.avg_nilai_akumulasi)}</td>
    <td>${tierBadge(r.tier_regional||r.tier)}</td><td style="text-align:right">${n(r.total_dapat_jo)}</td>
    <td style="font-family:'DM Mono',monospace">${sc(r.avg_mid_a1)||sc(r.avg_mid_n5)||'—'}</td>
    <td style="font-family:'DM Mono',monospace">${sc(r.avg_final_a1)||sc(r.avg_final_n5)||'—'}</td>
    <td style="font-family:'DM Mono',monospace;color:${issuesCount(r)>0?'var(--red)':'inherit'}">${issuesCount(r)||0}</td>
  </tr>`).join('');

  setMain(kpi+charts+`<div class="tcard"><div class="thead-row"><span class="ttitle">Data per Regional</span><span class="tcnt">${data.length} regional</span></div>
    <div class="twrap"><table><thead><tr>
      <th>Regional</th><th>Program</th><th>Skema</th><th>Batch</th><th>Student</th>
      <th>Kehadiran</th><th>Avg Nilai</th><th>Tier</th><th>JO</th><th>Avg Mid</th><th>Avg Final</th><th>Issues</th>
    </tr></thead><tbody>${rows}</tbody></table></div></div>`);
}

// ── BATCH ─────────────────────────────────────────────────────────────────────
function renderBatch(){
  const f=filters.batch;
  const data=DATA.batch.filter(r=>{
    if(f.search&&!(r.batch||'').toLowerCase().includes(f.search.toLowerCase())) return false;
    if(f.program&&!matchFilter(r.program,f.program)) return false;
    if(f.regional&&!matchFilter(r.regional,f.regional)) return false;
    if(f.tier&&(r.tier||'')!==f.tier) return false;
    return true;
  });
  setSidebar(buildFilters({search:true,program:true,regional:true,tier:true},'batch'));
  if(!data.length){setMain('<div class="empty">Tidak ada data batch.</div>');return;}

  const totSt=data.reduce((s,r)=>s+n(r.total_student),0);
  const avgH=avg(data,'avg_kehadiran');
  const avgN=avg(data,'avg_nilai_akumulasi');
  const totIss=data.reduce((s,r)=>s+issuesCount(r),0);

  const jumlahDetractorB=data.reduce((s,r)=>s+n(r.jumlah_nps_detractor),0);
  const jumlahRatingRendahB=data.reduce((s,r)=>s+n(r.jumlah_rating_rendah),0);
  const jumlahComplaintB=data.reduce((s,r)=>s+n(r.jumlah_complaint),0);
  const avgNAusB=avg(data.filter(r=>/ausbildung/i.test(r.program||'')),'avg_nilai_ausbildung');
  const avgNTokB=avg(data.filter(r=>/tokutei/i.test(r.program||'')),'avg_nilai_tokutei');

  const kpi=`<div class="kpi-row">
    <div class="kpi"><div class="kpi-l">Total Batch</div><div class="kpi-v">${data.length}</div><div class="kpi-s">Dalam filter aktif</div></div>
    <div class="kpi"><div class="kpi-l">Total Student</div><div class="kpi-v">${totSt.toLocaleString('id')}</div><div class="kpi-s">Semua batch terpilih</div></div>
    <div class="kpi"><div class="kpi-l">Avg Kehadiran</div><div class="kpi-v">${avgH.toFixed(1)}%</div><div class="kpi-s">Rata-rata antar batch</div><div class="kpi-bar"><div class="kpi-fill" style="width:${avgH}%"></div></div></div>
    <div class="kpi"><div class="kpi-l">Avg Nilai</div><div class="kpi-v">${avgN.toFixed(1)}</div><div style="display:flex;gap:10px;margin-top:4px">
      <div style="font-size:10px;color:var(--text3)">Aus: <b style="color:var(--text2)">${avgNAusB>0?avgNAusB.toFixed(1):'—'}</b></div>
      <div style="font-size:10px;color:var(--text3)">Tok: <b style="color:var(--text2)">${avgNTokB>0?avgNTokB.toFixed(1):'—'}</b></div>
    </div></div>
    <div class="kpi"><div class="kpi-l">Feedback Perlu Perhatian</div><div style="display:flex;gap:10px;margin-top:2px">
      <div><div class="kpi-v" style="font-size:18px;color:var(--red)">${jumlahDetractorB}</div><div style="font-size:9px;color:var(--text3)">Detractor</div></div>
      <div><div class="kpi-v" style="font-size:18px;color:var(--amber)">${jumlahRatingRendahB}</div><div style="font-size:9px;color:var(--text3)">Rating Rendah</div></div>
      <div><div class="kpi-v" style="font-size:18px;color:var(--red)">${jumlahComplaintB}</div><div style="font-size:9px;color:var(--text3)">Complaint</div></div>
    </div></div>
  </div>`;

  const chartData=data.filter(r=>isDuringProgramBatch(r.batch)); // sembunyikan post-program dari chart/tabel visual

  const charts=`<div class="charts-row">
    <div class="chart-card"><div class="chart-title">Top 5 Batch (Student)</div>${barChart([...chartData].sort((a,b)=>n(b.total_student)-n(a.total_student)).slice(0,5).map(r=>({l:(r.batch||''),v:n(r.total_student)})))}</div>
    <div class="chart-card"><div class="chart-title">Avg Kehadiran (Top 6)</div>${barChart([...chartData].sort((a,b)=>n(b.avg_kehadiran)-n(a.avg_kehadiran)).slice(0,6).map(r=>({l:(r.batch||''),v:n(r.avg_kehadiran)})),'var(--teal)')}</div>
    <div class="chart-card"><div class="chart-title">Distribusi Tier</div>${barChart([
      {l:'Excellent',v:data.reduce((s,r)=>s+n(r.tier_1_excellent),0)},
      {l:'Good',v:data.reduce((s,r)=>s+n(r.tier_2_good),0)},
      {l:'Need Improvement',v:data.reduce((s,r)=>s+n(r.tier_3_need_improvement),0)},
      {l:'At-Risk',v:data.reduce((s,r)=>s+n(r.tier_4_at_risk),0)},
      {l:'Critical',v:data.reduce((s,r)=>s+n(r.tier_5_critical),0)},
    ],'var(--blue)')}</div>
  </div>`;

  const rows=data.map((r,i)=>`<tr onclick="openBatchDetail(${i})">
    <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis" title="${r.batch||''}">${(r.batch||'—').substring(0,28)}${(r.batch||'').length>28?'…':''}</td>
    <td>${r.program||'—'}</td><td>${r.regional||'—'}</td>
    <td style="text-align:right">${n(r.total_student)}</td>
    <td>${pctBar(r.avg_kehadiran)}</td>
    <td style="font-family:'DM Mono',monospace">${sc(r.avg_nilai_akumulasi)}</td>
    <td>${tierBadge(r.tier||r.tier_regional)}</td>
    <td style="text-align:right;font-family:'DM Mono',monospace">${n(r.partisipan_mid_a1)||n(r.partisipan_mid_n5)||'—'}</td>
    <td style="text-align:right;font-family:'DM Mono',monospace">${n(r.partisipan_final_a1)||n(r.partisipan_final_n5)||'—'}</td>
    <td style="font-family:'DM Mono',monospace;color:${issuesCount(r)>0?'var(--red)':'inherit'}">${issuesCount(r)||0}</td>
    <td>${joBadge(n(r.total_dapat_jo)>0?'Dapat JO':'Belum JO')}</td>
  </tr>`).join('');

  window._batchData=data;
  setMain(kpi+charts+`<div class="tcard"><div class="thead-row"><span class="ttitle">Data per Batch</span><span class="tcnt">${data.length} batch</span></div>
    <div class="twrap"><table><thead><tr>
      <th>Batch</th><th>Program</th><th>Regional</th><th>Student</th>
      <th>Kehadiran</th><th>Avg Nilai</th><th>Tier</th><th>Part. Mid</th><th>Part. Final</th><th>Issues</th><th>JO</th>
    </tr></thead><tbody>${rows}</tbody></table></div></div>`);
}

    </div>
    ${aus?`<div class="dp-sec">Nilai Ausbildung</div>${[['Mid A1','avg_mid_a1'],['Final A1','avg_final_a1'],['Mid A2','avg_mid_a2'],['Final A2','avg_final_a2'],['Mid B1','avg_mid_b1'],['Final B1','avg_final_b1']].filter(([l,k])=>n(r[k])>0).map(([l,k])=>`<div class="sc-row"><span class="sc-key">${l}</span><div class="sc-bg"><div class="sc-fill" style="width:${n(r[k])}%"></div></div><span class="sc-num">${sc(r[k])}</span></div>`).join('')}`:''}
    ${tok?`<div class="dp-sec" style="margin-top:8px">Nilai Tokutei</div>${[['Mid N5','avg_mid_n5'],['Final N5','avg_final_n5'],['Mid N4','avg_mid_n4'],['Final N4','avg_final_n4']].filter(([l,k])=>n(r[k])>0).map(([l,k])=>`<div class="sc-row"><span class="sc-key">${l}</span><div class="sc-bg"><div class="sc-fill" style="width:${n(r[k])}%;background:var(--teal)"></div></div><span class="sc-num">${sc(r[k])}</span></div>`).join('')}`:''}
    <div class="dp-sec" style="margin-top:8px">Partisipan Ujian</div>
    <div style="display:flex;flex-wrap:wrap;gap:5px">${[['Mid A1','partisipan_mid_a1'],['Final A1','partisipan_final_a1'],['Mid N5','partisipan_mid_n5'],['Final N5','partisipan_final_n5'],['Mid N4','partisipan_mid_n4'],['Final N4','partisipan_final_n4']].filter(([l,k])=>n(r[k])>0).map(([l,k])=>`<span style="background:var(--purple-bg);color:var(--purple-dk);font-size:10px;padding:2px 8px;border-radius:20px">${l}: ${n(r[k])}</span>`).join('')}</div>
    <div class="dp-kpi" style="margin-top:8px">
      <div class="dp-kc"><div class="dp-kl">NPS Promoter</div><div class="dp-kv" style="color:var(--green)">${n(r.nps_promoter)}</div></div>
      <div class="dp-kc"><div class="dp-kl">Total Issues</div><div class="dp-kv" style="color:var(--red)">${issuesCount(r)}</div></div>
      <div class="dp-kc"><div class="dp-kl">Dapat JO</div><div class="dp-kv" style="color:var(--teal)">${n(r.total_dapat_jo)}</div></div>
      <div class="dp-kc"><div class="dp-kl">Avg Rating</div><div class="dp-kv">${sc(r.avg_session_rating)}</div></div>
    </div>`;
  document.getElementById('detailOverlay').style.display='flex';

// ── STUDENT ───────────────────────────────────────────────────────────────────
function renderStudent(){
  const f=filters.student;
  const data=DATA.student.filter(r=>{
    if(f.search&&!(displayName(r)).toLowerCase().includes(f.search.toLowerCase())) return false;
    if(f.program&&!matchFilter(r.program,f.program)) return false;
    if(f.batch&&!matchFilter(r.batch,f.batch)) return false;
    if(f.tier&&r.tier!==f.tier) return false;
    if(f.jo&&r.jo_flag!==f.jo) return false;
    if(f.event&&!(r.list_sesi||'').includes(f.event)) return false;
    return true;
  });

  setSidebar(buildFilters({search:true,program:true,batch:true,event:true,tier:true,jo:true},'student')+`
    <div class="divider"></div>
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-v">${data.length.toLocaleString('id')}</div><div class="stat-l">Student</div></div>
      <div class="stat-card"><div class="stat-v">${data.filter(r=>r.jo_flag==='Dapat JO').length}</div><div class="stat-l">Dapat JO</div></div>
      <div class="stat-card"><div class="stat-v">${avg(data,'pct_kehadiran').toFixed(0)}%</div><div class="stat-l">Avg Hadir</div></div>
      <div class="stat-card"><div class="stat-v">${data.reduce((s,r)=>s+issuesCount(r),0)}</div><div class="stat-l">Issues</div></div>
    </div>`);

  if(!data.length){setMain('<div class="empty">Tidak ada data student.</div>');return;}

  const avgH=avg(data,'pct_kehadiran');
  const avgN=avg(data,'avg_nilai_akumulasi');
  const avgNAus=avg(data.filter(r=>/ausbildung/i.test(r.program||'')),'avg_nilai_akumulasi_ausbildung');
  const avgNTok=avg(data.filter(r=>/tokutei/i.test(r.program||'')),'avg_nilai_akumulasi_tokutei');
  const totJO=data.filter(r=>r.jo_flag==='Dapat JO').length;
  const totIss=data.reduce((s,r)=>s+issuesCount(r),0);

  const jumlahDetractor=data.reduce((s,r)=>s+n(r.jumlah_nps_detractor),0);
  const jumlahRatingRendah=data.reduce((s,r)=>s+n(r.jumlah_rating_rendah),0);
  const jumlahComplaint=data.reduce((s,r)=>s+n(r.jumlah_complaint),0);

  const kpi=`<div class="kpi-row">
    <div class="kpi"><div class="kpi-l">Total Student</div><div class="kpi-v">${data.length.toLocaleString('id')}</div><div class="kpi-s">Dalam filter aktif</div></div>
    <div class="kpi"><div class="kpi-l">Avg Kehadiran</div><div class="kpi-v">${avgH.toFixed(1)}%</div><div class="kpi-s">Rata-rata semua student</div><div class="kpi-bar"><div class="kpi-fill" style="width:${avgH}%"></div></div></div>
    <div class="kpi"><div class="kpi-l">Avg Nilai</div><div class="kpi-v">${avgN.toFixed(1)}</div><div style="display:flex;gap:10px;margin-top:4px">
      <div style="font-size:10px;color:var(--text3)">Aus: <b style="color:var(--text2)">${avgNAus>0?avgNAus.toFixed(1):'—'}</b></div>
      <div style="font-size:10px;color:var(--text3)">Tok: <b style="color:var(--text2)">${avgNTok>0?avgNTok.toFixed(1):'—'}</b></div>
    </div></div>
    <div class="kpi"><div class="kpi-l">Job Offer</div><div class="kpi-v">${totJO}</div><div class="kpi-s">${data.length>0?(totJO/data.length*100).toFixed(1)+'%':''} dari total</div></div>
    <div class="kpi"><div class="kpi-l">Feedback Perlu Perhatian</div><div style="display:flex;gap:10px;margin-top:2px">
      <div><div class="kpi-v" style="font-size:18px;color:var(--red)">${jumlahDetractor}</div><div style="font-size:9px;color:var(--text3)">Detractor</div></div>
      <div><div class="kpi-v" style="font-size:18px;color:var(--amber)">${jumlahRatingRendah}</div><div style="font-size:9px;color:var(--text3)">Rating Rendah</div></div>
      <div><div class="kpi-v" style="font-size:18px;color:var(--red)">${jumlahComplaint}</div><div style="font-size:9px;color:var(--text3)">Complaint</div></div>
    </div></div>
  </div>`;

  const chartDataS=data.filter(r=>isDuringProgramBatch(r.batch)); // sembunyikan post-program dari chart visual

  const charts=`<div class="charts-row">
    <div class="chart-card"><div class="chart-title">Distribusi Tier</div>${barChart(['1 - Excellent','2 - Good','3 - Need Improvement','4 - At-Risk','5 - Critical'].map(t=>({l:t.replace(/^\d - /,''),v:data.filter(r=>r.tier===t).length})),'var(--blue)')}</div>
    <div class="chart-card"><div class="chart-title">Top 5 Batch (Student)</div>${barChart(Object.entries(chartDataS.reduce((acc,r)=>{acc[r.batch||'?']=(acc[r.batch||'?']||0)+1;return acc},{})).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([l,v])=>({l:l,v})))}</div>
    <div class="chart-card"><div class="chart-title">NPS Terakhir <span style="color:var(--text3);font-weight:400">(dari yang sudah isi)</span></div>${barChart([
      {l:'Promoter',v:data.filter(r=>r.nps_status_terakhir==='Promoter').length},
      {l:'Passive',v:data.filter(r=>r.nps_status_terakhir==='Passive').length},
      {l:'Detractor',v:data.filter(r=>r.nps_status_terakhir==='Detractor').length},
    ],['var(--green)','var(--amber)','var(--red)'])}
    <div style="margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border);font-size:10px;color:var(--text3)">${data.filter(r=>!r.nps_status_terakhir).length.toLocaleString('id')} dari ${data.length.toLocaleString('id')} student belum pernah mengisi survey NPS</div>
    </div>
  </div>`;

  // Display semua data (limit 2000 untuk performa)
  const LIMIT=2000;
  const displayed=data.slice(0,LIMIT);
  const rows=displayed.map(r=>`<tr onclick="openStudentDetail(${DATA.student.indexOf(r)})">
    <td style="font-weight:500;max-width:160px;overflow:hidden;text-overflow:ellipsis">${displayName(r)}</td>
    <td style="color:var(--text2);max-width:140px;overflow:hidden;text-overflow:ellipsis" title="${r.batch||''}">${(r.batch||'—').substring(0,22)}${(r.batch||'').length>22?'…':''}</td>
    <td style="color:var(--text2)">${r.program||'—'}</td>
    <td>${r.regional||'—'}</td>
    <td>${pctBar(r.pct_kehadiran)}</td>
    <td style="font-family:'DM Mono',monospace">${r.avg_nilai_akumulasi?sc(r.avg_nilai_akumulasi):'—'}</td>
    <td>${tierBadge(r.tier)}</td>
    <td>${npsBadge(r.nps_status_terakhir)}</td>
    <td style="font-family:'DM Mono',monospace;color:${issuesCount(r)>0?'var(--red)':'var(--text3)'}">${issuesCount(r)||'0'}</td>
    <td>${joBadge(r.jo_flag)}</td>
  </tr>`).join('');

  setMain(kpi+charts+`<div class="tcard"><div class="thead-row"><span class="ttitle">Daftar Student</span><span class="tcnt">${data.length.toLocaleString('id')} student${data.length>LIMIT?' ('+LIMIT+' pertama — gunakan filter)':''}</span></div>
    <div class="twrap"><table><thead><tr>
      <th>Nama</th><th>Batch</th><th>Program</th><th>Regional</th>
      <th>Kehadiran</th><th>Avg Nilai</th><th>Tier</th><th>NPS</th><th>Issues</th><th>JO</th>
    </tr></thead><tbody>${rows}</tbody></table></div></div>`);
}

function openStudentDetail(i){
  const r=DATA.student[i];if(!r)return;
  const aus=n(r.avg_mid_a1)>0||n(r.avg_final_a1)>0;
  const tok=n(r.avg_mid_n5)>0||n(r.avg_final_n5)>0;
  const scoreRows=(pairs)=>pairs.filter(([l,k])=>n(r[k])>0).map(([l,k])=>`<div class="sc-row"><span class="sc-key">${l}</span><div class="sc-bg"><div class="sc-fill" style="width:${Math.min(n(r[k]),100)}%"></div></div><span class="sc-num">${n(r[k]).toFixed(1)}</span></div>`).join('');
  const logbooks=(r.list_sesi||'').split('|').map(s=>s.trim()).filter(Boolean);
  document.getElementById('detailPanel').innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div class="dp-name">${displayName(r)}</div>
        <div class="dp-meta">${r.student_email||''}</div>
        <div class="dp-meta" style="margin-top:2px">${r.batch||'—'} · ${r.program||'—'} · ${r.regional||'—'}</div>
      </div>
      <button class="dp-close" onclick="closeDetail()">✕</button>
    </div>
    ${r.jo_date?`<div style="background:var(--teal-bg);border:0.5px solid #7ECFB5;border-radius:9px;padding:9px 12px;font-size:12px;color:var(--teal-dk)">Job Offer: <b>${r.jo_date}</b>${r.status_student?' · '+r.status_student:''}</div>`:
    `<div style="background:var(--gray-bg);border-radius:9px;padding:9px 12px;font-size:11px;color:var(--gray-dk)">Belum JO${r.status_student?' · Status: '+r.status_student:''}</div>`}
    <div class="dp-kpi">
      <div class="dp-kc"><div class="dp-kl">Kehadiran</div><div class="dp-kv" style="color:var(--purple)">${sc(r.pct_kehadiran)}%</div><div style="font-size:10px;color:var(--text3)">${r.student_hadir||0} dari ${r.jumlah_sesi_terlaksana||'?'} sesi</div></div>
      <div class="dp-kc"><div class="dp-kl">Avg Nilai</div><div class="dp-kv" style="color:var(--teal)">${sc(r.avg_nilai_akumulasi)}</div><div style="margin-top:3px">${tierBadge(r.tier)}</div></div>
    </div>
    <div class="dp-sec" style="margin-top:4px">Feedback &amp; NPS</div>
    <div class="dp-kpi">
      <div class="dp-kc"><div class="dp-kl">Avg Session Rating</div><div class="dp-kv">${r.avg_session_rating||'—'}</div><div style="font-size:10px;color:var(--text3)">dari ${r.total_session_rating||0} rating</div></div>
      <div class="dp-kc"><div class="dp-kl">NPS Terakhir</div><div style="margin-top:6px">${npsBadge(r.nps_status_terakhir)}</div></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:5px">
      <div class="fb-toggle" onclick="toggleFb(this)" style="cursor:pointer;background:var(--surface2);border-radius:9px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;font-weight:500">NPS — riwayat lengkap</span>
        <span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--text2)">${r.total_nps||0} survey ▾</span>
      </div>
      <div class="fb-content" style="display:none;padding-left:4px">
        ${parseDetailList(r.detail_nps_history).length?parseDetailList(r.detail_nps_history).map(d=>`<div class="logbook-item" style="border-left:3px solid ${d.content.startsWith('Detractor')?'var(--red)':d.content.startsWith('Passive')?'var(--amber)':'var(--green)'}"><div style="font-size:9px;color:var(--text3);margin-bottom:2px">${d.date}</div>${d.content}</div>`).join(''):
        '<div style="font-size:11px;color:var(--text3);padding:6px">Belum ada survey NPS</div>'}
      </div>

      <div class="fb-toggle" onclick="toggleFb(this)" style="cursor:pointer;background:var(--surface2);border-radius:9px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:11px;font-weight:500">Session Rating Rendah <span style="color:var(--text3)">(≤2 dari 5)</span></span>
        <span style="font-size:11px;font-family:'DM Mono',monospace;color:${n(r.jumlah_rating_rendah)>0?'var(--amber)':'var(--text3)'}">${n(r.jumlah_rating_rendah)} ▾</span>
      </div>
      <div class="fb-content" style="display:none;padding-left:4px">
        ${parseDetailList(r.detail_rating_rendah).length?parseDetailList(r.detail_rating_rendah).map(d=>`<div class="logbook-item" style="border-left:3px solid var(--amber)"><div style="font-size:9px;color:var(--text3);margin-bottom:2px">${d.date}</div>${d.content}</div>`).join(''):
        n(r.jumlah_rating_rendah)>0?`<div style="font-size:11px;color:var(--text3);padding:6px">${n(r.jumlah_rating_rendah)} rating rendah tercatat, namun tidak ada catatan teks</div>`:
        '<div style="font-size:11px;color:var(--text3);padding:6px">Tidak ada rating rendah</div>'}
      </div>

      <div class="fb-toggle" onclick="toggleFb(this)" style="cursor:pointer;background:var(--surface2);border-radius:9px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center">

        <span style="font-size:11px;font-family:'DM Mono',monospace;color:${n(r.jumlah_complaint)>0?'var(--red)':'var(--text3)'}">${n(r.jumlah_complaint)} ▾</span>
      </div>
      <div class="fb-content" style="display:none;padding-left:4px">
        ${parseDetailList(r.detail_complaint).length?parseDetailList(r.detail_complaint).map(d=>`<div class="logbook-item" style="border-left:3px solid var(--red)"><div style="font-size:9px;color:var(--text3);margin-bottom:2px">${d.date}</div>${d.content}</div>`).join(''):
        n(r.jumlah_complaint)>0?`<div style="font-size:11px;color:var(--text3);padding:6px">${n(r.jumlah_complaint)} complaint tercatat, namun tidak ada catatan teks (kualitatif_feedback kosong di source)</div>`:
        '<div style="font-size:11px;color:var(--text3);padding:6px">Tidak ada complaint</div>'}
      </div>
    </div>
    ${aus?`<div class="dp-sec">Nilai Ausbildung</div>${scoreRows([['Mid A1','avg_mid_a1'],['Final A1','avg_final_a1'],['Mid A2','avg_mid_a2'],['Final A2','avg_final_a2'],['Mid B1','avg_mid_b1'],['Final B1','avg_final_b1']])}`:
     tok?`<div class="dp-sec">Nilai Tokutei</div>${scoreRows([['Mid N5','avg_mid_n5'],['Final N5','avg_final_n5'],['Mid N4','avg_mid_n4'],['Final N4','avg_final_n4']])}`:
     '<div style="font-size:11px;color:var(--text3);text-align:center;padding:10px">Data nilai belum tersedia</div>'}

  document.getElementById('detailOverlay').style.display='flex';
}

// Parse format "tanggal||isi ~~~ tanggal||isi ~~~ ..." dari query BQ jadi array {date, content}
function parseDetailList(raw){
  if(!raw) return [];
  return raw.split('~~~').map(s=>s.trim()).filter(Boolean).map(s=>{
    const idx=s.indexOf('||');
    if(idx===-1) return {date:'',content:s};
    return {date:s.substring(0,idx),content:s.substring(idx+2)};
  }).sort((a,b)=>b.date.localeCompare(a.date));
}
function toggleFb(el){
  const content=el.nextElementSibling;
  const arrow=el.querySelector('span:last-child');
  const isOpen=content.style.display==='block';
  content.style.display=isOpen?'none':'block';
  if(arrow) arrow.textContent=arrow.textContent.replace(isOpen?'▴':'▾',isOpen?'▾':'▴');
}
function closeDetail(){document.getElementById('detailOverlay').style.display='none';}
</script>
